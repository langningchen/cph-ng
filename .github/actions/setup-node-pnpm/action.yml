name: Setup Node and PNPM
description: Setup PNPM and Node.js (with pnpm cache), then install dependencies
inputs:
  node-version:
    description: Node.js version to use
    default: "24"
    required: false
runs:
  using: composite
  steps:
    - name: Setup PNPM
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
