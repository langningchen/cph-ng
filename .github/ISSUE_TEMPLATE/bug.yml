name: Bug Report
description: Something isn't working as expected
labels: bug
assignees: langningchen
title: "bug: "
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill in the
        information below to help us reproduce and fix the issue. Before
        submitting, please search the existing issues to see if someone else has
        already reported the same bug.
  - type: textarea
    attributes:
      label: Extension Version
      description:
        "The version of the extension you are using, you can find it in the
        command palette by searching for `CPH-NG: Version Info`."
      placeholder: |
        Version: 0.6.1
        Commit: 0ed418d6bcd6731257cc2e4b0f6a25af7a5041e5
        Date: 2026-02-24T07:47:11.679Z
        Build By: Langning Chen
        Build Type: Manual
        OS: 6.6.87.2-microsoft-standard-WSL2
    validations:
      required: true
  - type: textarea
    attributes:
      label: VSCode Version
      description:
        The version of VSCode you are using, you can find it in the Help > About
        menu.
      placeholder: |
        Version: 1.110.0-insider (user setup)
        Commit: 62028559c1ca63edaa7fd32d3845ea502af07ab2
        Date: 2026-02-23T17:04:00.460Z
        Electron: 39.6.0
        ElectronBuildId: 13330601
        Chromium: 142.0.7444.265
        Node.js: 22.22.0
        V8: 14.2.231.22-electron.0
        OS: Windows_NT x64 10.0.19045
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: Describe the bug
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction Steps
      description: Describe the steps to reproduce the behavior
      placeholder: Steps to reproduce the behavior
  - type: textarea
    attributes:
      label: Log Output
      description:
        If applicable, add log output to help explain your problem. You can find
        the logs in the VSCode output panel. Make sure to not include any
        sensitive information. We recommend providing the log output with the
        trace level.
      placeholder: Log output here, please wrap with code block (```)
