name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  attestations: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      version_changed: ${{ steps.versions.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 2
      - uses: ./.github/actions/setup-node-pnpm
      - name: Build all packages
        run: pnpm build-all
        env:
          BUILD_TYPE: Auto build
      - name: Detect version changes
        id: versions
        if: github.event_name == 'push'
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/vscode-ext/package.json').version")
          PREV_VERSION=$(git show HEAD~1:packages/vscode-ext/package.json | node -p "JSON.parse(fs.readFileSync(0)).version" || echo "0.0.0")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: dist/*
          if-no-files-found: error
      - name: Generate Provenance
        if: |
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.action != 'closed') &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

  publish:
    needs: [build]
    if: needs.build.outputs.version_changed == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: ./.github/actions/setup-node-pnpm
      - name: Determine release type
        id: release
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PATCH=$(echo "$VERSION" | awk -F. '{print $3}')
          if [ "$PATCH" = "0" ]; then
            PRE_RELEASE=false
          else
            PRE_RELEASE=true
          fi
          echo "pre_release=$PRE_RELEASE" >> $GITHUB_OUTPUT
      - name: Create tag
        run: |
          git tag "v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"
      - name: Publish VS Code
        working-directory: packages/vscode-ext
        run: |
          if [ "${{ steps.release.outputs.pre_release }}" = "true" ]; then
            pnpm publish --pre-release
          else
            pnpm publish
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish Browser
        working-directory: packages/browser-ext
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          pnpm release \
            --firefox-zip ./dist/cph-ng-submit-$VERSION-firefox.zip \
            --firefox-sources-zip ./dist/cph-ng-submit-$VERSION-sources.zip \
            --edge-zip ./dist/cph-ng-submit-$VERSION-chrome.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_SKIP_SUBMIT_REVIEW: ${{ secrets.EDGE_SKIP_SUBMIT_REVIEW }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          FIREFOX_CHANNEL: ${{ secrets.FIREFOX_CHANNEL }}
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          changelog_content=$(awk "/^## $VERSION\$/{flag=1; next} (/^## / || /^<details>/){flag=0} flag" CHANGELOG.md)
          [ -z "$changelog_content" ] && changelog_content="- No changelog content available"
          echo "changelog_content<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: ./*.vsix
          prerelease: ${{ steps.release.outputs.pre_release }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog_content }}

            ${{ steps.release.outputs.pre_release == 'true' && '⚠️ **This is a pre-release version.**' || '' }}

            ## Installation
            Download the `.vsix` file or install from the marketplace.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Move cards in project
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_GITHUB_TOKEN }}
          PRE_RELEASE: ${{ steps.release.outputs.pre_release }}
        run: |
          set -eux
          PROJECT="/users/langningchen/projectsV2/8"
          ACCEPT_HEADER="application/vnd.github+json"

          move_cards() {
            ENCODED_STATUS=$(printf '%s' "$1" | jq -s -R -r @uri)
            cards_json=$(gh api "$PROJECT/items?q=status:$ENCODED_STATUS" -H "Accept: $ACCEPT_HEADER")
            echo "$cards_json" | jq -r '.[].id' | while read -r card_id; do
              if [ -z "$card_id" ] || [ "$card_id" = "null" ]; then
                continue
              fi
              echo "Moving card $card_id -> column $2"
              gh api -X PATCH $PROJECT/items/"$card_id" -H "Accept: $ACCEPT_HEADER" --input - <<< '{
                "fields": [
                  {
                    "id": 234281529,
                    "value": "'"$2"'"
                  }
                ]
              }'
            done
          }

          if [ "$PRE_RELEASE" = "false" ]; then
            echo "Normal release: moving Done -> Released and Pre-release -> Released"
            move_cards "Done" 98236657
            move_cards "Pre-released" 98236657
          else
            echo "Pre-release only: moving Done -> Pre-release"
            move_cards "Done" 300944f4
          fi
