name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  attestations: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
      - name: Run tests
        run: pnpm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      version_changed: ${{ steps.versions.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          submodules: true
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build all packages
        run: |
          echo "::group::Building packages"
          pnpm package
          echo "::endgroup::"
        env:
          BUILD_TYPE: Auto Build
      - name: Detect version changes
        id: versions
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          echo "::group::Detecting version"
          CURRENT_VERSION=$(node -p "require('./packages/vscode-ext/package.json').version")
          PREV_VERSION=$(git show HEAD^:packages/vscode-ext/package.json 2>/dev/null | node -p "JSON.parse(fs.readFileSync(0) || '{}').version" || echo "0.0.0")

          echo "Current: $CURRENT_VERSION, Previous: $PREV_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          VERSION_CHANGED=false
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            VERSION_CHANGED=true
            echo "Version change detected via git diff."
          elif [ "${{ github.event.inputs.force_publish }}" == "true" ]; then
            VERSION_CHANGED=true
            echo "Version change forced via manual input."
          fi

          echo "version_changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT
          echo "Version changed: $VERSION_CHANGED"
          echo "::endgroup::"
      - name: Check Artifacts
        run: |
          echo "::group::Verifying artifacts"
          ls -lh dist/
          echo "::endgroup::"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cph-ng-artifacts
          path: dist/*
          if-no-files-found: error

      - name: Generate Provenance
        if: |
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.action != 'closed') &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  publish:
    needs: [build]
    if: needs.build.outputs.version_changed == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Determine release type
        id: release
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "::group::Versioning Info"
          echo "Version: $VERSION"
          PATCH=$(echo "$VERSION" | awk -F. '{print $3}')
          PRE_RELEASE=$([ "$PATCH" = "0" ] && echo "false" || echo "true")
          echo "pre_release=$PRE_RELEASE" >> $GITHUB_OUTPUT
          echo "Prerelease: $PRE_RELEASE"
          echo "::endgroup::"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: cph-ng-artifacts
          path: dist/

      - name: Check Artifacts
        run: |
          echo "::group::Verifying artifacts"
          ls -lh dist/
          echo "::endgroup::"

      - name: Publish VS Code
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          echo "::group::Publishing to VS Code Marketplace"
          VERSION="${{ needs.build.outputs.version }}"
          IS_PRE="${{ steps.release.outputs.pre_release }}"
          FLAGS="--allow-star-activation --no-dependencies -i ../../dist/cph-ng-$VERSION.vsix"
          [ "$IS_PRE" = "true" ] && FLAGS="$FLAGS --pre-release"
          pnpm -C packages/vscode-ext exec vsce publish $FLAGS
          echo "::endgroup::"

      - name: Publish Browser
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_SKIP_SUBMIT_REVIEW: ${{ secrets.EDGE_SKIP_SUBMIT_REVIEW }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          FIREFOX_CHANNEL: ${{ secrets.FIREFOX_CHANNEL }}
        run: |
          echo "::group::Publishing to Browser Stores"
          VERSION="${{ needs.build.outputs.version }}"
          pnpm -C packages/browser-ext exec wxt submit \
            --firefox-zip ../../dist/cph-ng-submit-$VERSION-firefox.zip \
            --firefox-sources-zip ../../dist/cph-ng-submit-$VERSION-sources.zip \
            --edge-zip ../../dist/cph-ng-submit-$VERSION-chrome.zip
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: ./dist/*
          prerelease: ${{ steps.release.outputs.pre_release }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move cards in project
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_GITHUB_TOKEN }}
          PRE_RELEASE: ${{ steps.release.outputs.pre_release }}
        run: bash scripts/move-cards.sh
